<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Civil At Hand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            
        }

        .subtitle {
            color: #6b7280;
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
            transition: color 0.3s;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f9fafb;
            color: #111827;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        input:focus + .input-icon {
            color: #667eea;
        }

        input::placeholder {
            color: #9ca3af;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 5px;
            font-size: 18px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .button-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button.loading .loader {
            display: block;
        }

        button.loading .button-text {
            display: none;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-left: 4px solid #ef4444;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.5;
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d1fae5;
            border: 1px solid #a7f3d0;
            border-left: 4px solid #10b981;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 13px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #9ca3af;
            font-size: 13px;
            position: relative;
        }

        .signup-link {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        /* Validation indicator */
        .input-group.error input {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .input-group.success input {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .validation-message {
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .input-group.error .validation-message {
            color: #ef4444;
            display: block;
        }

        .input-group.success .validation-message {
            color: #10b981;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <span class="logo-icon">🏗️</span>
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to Civil At Hand</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="input-group" id="emailGroup">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="you@example.com" 
                        autocomplete="email"
                        required
                        aria-describedby="emailError"
                    >
                </div>
                <span class="validation-message" id="emailError"></span>
            </div>

            <div class="input-group" id="passwordGroup">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        autocomplete="current-password"
                        required
                        minlength="6"
                        aria-describedby="passwordError"
                    >
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                        👁️
                    </button>
                </div>
                <span class="validation-message" id="passwordError"></span>
            </div>

            <div class="forgot-password">
                <a href="/forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" id="loginBtn">
                <span class="button-content">
                    <span class="button-text">Sign In</span>
                    <span class="loader"></span>
                </span>
            </button>
        </form>

        <div class="error-message" id="errorMessage" role="alert"></div>
        <div class="success-message" id="successMessage" role="status"></div>

        <div class="divider">
            <span>New to Civil At Hand?</span>
        </div>

        <div class="signup-link">
            <a href="/signup">Create an account</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB5Tnxu44OmT72EJPAKl6QtdgO7-OtP3RI",
            authDomain: "civil-at-hand-3cc14.firebaseapp.com",
            projectId: "civil-at-hand-3cc14",
            appId: "1:399251861477:web:a2711a99f8a9d9c398090c"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const togglePassword = document.getElementById('togglePassword');
        const emailGroup = document.getElementById('emailGroup');
        const passwordGroup = document.getElementById('passwordGroup');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
            
            // Refocus password input after toggle
            passwordInput.focus();
        });

        // Real-time email validation
        emailInput.addEventListener('input', () => {
            validateEmail(false);
        });

        emailInput.addEventListener('blur', () => {
            validateEmail(true);
        });

        // Real-time password validation
        passwordInput.addEventListener('input', () => {
            validatePassword(false);
        });

        passwordInput.addEventListener('blur', () => {
            validatePassword(true);
        });

        function validateEmail(showError = true) {
            const email = emailInput.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!email) {
                if (showError) {
                    setFieldError(emailGroup, emailError, 'Email is required');
                } else {
                    clearFieldStatus(emailGroup);
                }
                return false;
            } else if (!emailRegex.test(email)) {
                setFieldError(emailGroup, emailError, 'Please enter a valid email address');
                return false;
            } else {
                setFieldSuccess(emailGroup, emailError, 'Valid email ✓');
                return true;
            }
        }

        function validatePassword(showError = true) {
            const password = passwordInput.value;
            
            if (!password) {
                if (showError) {
                    setFieldError(passwordGroup, passwordError, 'Password is required');
                } else {
                    clearFieldStatus(passwordGroup);
                }
                return false;
            } else if (password.length < 6) {
                setFieldError(passwordGroup, passwordError, 'Password must be at least 6 characters');
                return false;
            } else {
                setFieldSuccess(passwordGroup, passwordError, 'Password looks good ✓');
                return true;
            }
        }

        function setFieldError(group, errorElement, message) {
            group.classList.add('error');
            group.classList.remove('success');
            errorElement.textContent = message;
        }

        function setFieldSuccess(group, errorElement, message) {
            group.classList.remove('error');
            group.classList.add('success');
            errorElement.textContent = message;
        }

        function clearFieldStatus(group) {
            group.classList.remove('error', 'success');
        }

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            if (isLoading) {
                loginBtn.classList.add('loading');
                loginBtn.setAttribute('aria-busy', 'true');
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.removeAttribute('aria-busy');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        function getUserFriendlyError(errorCode) {
            const errorMessages = {
                'auth/invalid-credential': 'Invalid email or password. Please try again.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/user-disabled': 'This account has been disabled. Please contact support.',
                'auth/user-not-found': 'No account found with this email address.',
                'auth/wrong-password': 'Incorrect password. Please try again.',
                'auth/too-many-requests': 'Too many login attempts. Please try again later.',
                'auth/network-request-failed': 'Network error. Please check your internet connection.',
                'auth/internal-error': 'An internal error occurred. Please try again.'
            };
            
            return errorMessages[errorCode] || 'An unexpected error occurred. Please try again.';
        }

        // Form submission handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            
            // Validate all fields
            const isEmailValid = validateEmail(true);
            const isPasswordValid = validatePassword(true);
            
            if (!isEmailValid || !isPasswordValid) {
                return;
            }
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Set loading state
            setLoading(true);
            
            try {
                // Add a small delay for better UX (optional)
                const loginPromise = signInWithEmailAndPassword(auth, email, password);
                
                // Add timeout for network issues
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('auth/network-request-failed')), 15000)
                );
                
                await Promise.race([loginPromise, timeoutPromise]);
                
                // Success
                showSuccess('Login successful! Redirecting...');
                
                // Clear form
                loginForm.reset();
                clearFieldStatus(emailGroup);
                clearFieldStatus(passwordGroup);
                
                // Redirect after a brief moment to show success message
                setTimeout(() => {
                    window.location.href = "/dashboard"; // Changed from "/" to "/dashboard" for better UX
                }, 800);
                
            } catch (error) {
                // Handle errors
                const friendlyMessage = getUserFriendlyError(error.code);
                showError(friendlyMessage);
                
                // Log error for debugging (only in development)
                if (window.location.hostname === 'localhost') {
                    console.error('Login error:', error);
                }
                
                // Shake the form on error
                loginForm.style.animation = 'shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97)';
                setTimeout(() => {
                    loginForm.style.animation = '';
                }, 500);
                
            } finally {
                setLoading(false);
            }
        });

        // Prevent double submission
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && loginBtn.disabled) {
                e.preventDefault();
            }
        });

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is signed in, redirect to dashboard
                if (window.location.pathname === '/login' || window.location.pathname === '/') {
                    window.location.href = '/dashboard';
                }
            }
        });

        // Log page view (for analytics)
        console.log('Login page loaded successfully');
    </script>
</body>
</html>
