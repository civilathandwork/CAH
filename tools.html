<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Civil Toolkit · smart calculators</title>
  <meta name="description" content="Professional civil calculators: brick, concrete, paint, area, steel & more. Visual results, India-ready.">
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --font-main: 'Inter', system-ui, sans-serif;
      --font-display: 'Manrope', sans-serif;
      /* Blue‑ish professional palette */
      --bg-page: #f4f7fc;
      --surface: #ffffff;
      --primary: #1a4c8c;        /* deep navy blue */
      --primary-light: #2b6cb0;
      --accent: #0f7b9e;         /* teal‑blue */
      --accent-soft: #d4e6f5;
      --text-main: #1e293b;
      --text-muted: #475569;
      --border-light: #e2e8f0;
      --shadow-card: 0 20px 35px -8px rgba(0,35,70,0.12), 0 8px 16px -6px rgba(0,0,0,0.05);
      --shadow-hover: 0 30px 45px -12px rgba(26,76,140,0.18);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --transition: all 0.25s cubic-bezier(0.2,0,0,1);
    }
    body{
      background: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-main);
      line-height: 1.5;
      padding: 24px 16px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .app-wrapper{
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
    }
    /* header minimal */
    .app-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo-area{
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon{
      width: 44px;
      height: 44px;
      background: linear-gradient(145deg, var(--primary), #0f3a6b);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 8px 14px -6px rgba(26,76,140,0.3);
    }
    .logo-text h1{
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      color: #0b2b4a;
    }
    .logo-text span{
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .pill-tag{
      background: var(--surface);
      padding: 8px 20px;
      border-radius: 60px;
      font-weight: 500;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
      border: 1px solid var(--border-light);
      color: var(--primary);
    }
    /* ---------- SELECTOR GRID (calculator cards) ---------- */
    .selector-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin: 40px 0 30px;
    }
    .calc-card{
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 24px 16px;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(2px);
      transition: var(--transition);
      cursor: pointer;
      text-align: center;
      border-bottom: 4px solid transparent;
    }
    .calc-card:hover{
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-bottom-color: var(--primary);
    }
    .calc-icon{
      font-size: 2.8rem;
      margin-bottom: 16px;
    }
    .calc-card h3{
      font-weight: 600;
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: #0b2b4a;
    }
    .calc-card p{
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    /* ---------- DETAIL VIEW (calculator panel) ---------- */
    .detail-view{
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 32px 28px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border-light);
      margin-top: 10px;
      transition: opacity 0.2s;
    }
    .back-btn{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border-light);
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 500;
      color: var(--primary);
      margin-bottom: 24px;
      cursor: pointer;
      transition: var(--transition);
    }
    .back-btn:hover{
      background: var(--accent-soft);
      border-color: var(--primary);
    }
    .calc-title{
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .calc-title h2{
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2.2rem;
      color: #0b2b4a;
    }
    .input-panel{
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 30px;
      align-items: start;
    }
    @media (max-width: 720px){
      .input-panel{
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }
    .form-grid{
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .input-group{
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-group label{
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--primary);
    }
    .input-field{
      background: #f9fcff;
      border: 1.5px solid var(--border-light);
      border-radius: 20px;
      padding: 14px 18px;
      font-size: 1rem;
      font-family: var(--font-main);
      transition: var(--transition);
      color: #0b2b4a;
      font-weight: 500;
    }
    .input-field:focus{
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(26,76,140,0.12);
      background: white;
    }
    select.input-field{
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%231a4c8c"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: right 18px center;
      background-size: 16px;
    }
    .row-2{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .result-card{
      background: linear-gradient(145deg, #eef4fa, #ffffff);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 8px 18px -8px rgba(26,76,140,0.12);
      border: 1px solid #d9e6f2;
    }
    .result-value{
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.2;
      margin: 12px 0 8px;
      font-family: var(--font-display);
    }
    .result-label{
      color: var(--text-muted);
      font-weight: 500;
    }
    .visual-container{
      margin-top: 24px;
      background: #ffffffd6;
      border-radius: 24px;
      padding: 20px 16px;
      text-align: center;
      border: 1px dashed var(--primary-light);
    }
    canvas{
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      background: #f0f6fe;
    }
    .brick-stats{
      display: flex;
      justify-content: space-around;
      margin-top: 12px;
      font-weight: 600;
    }
    .btn-primary{
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 10px 18px -8px #1a4c8c;
      border: 1px solid #ffffff30;
    }
    .btn-primary:hover{
      background: var(--primary-light);
      transform: scale(1.02);
    }
    .hidden{
      display: none !important;
    }
    .footer-note{
      margin-top: 48px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .unit-hint{
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    /* animations */
    .fade-in{animation: fade 0.3s ease;}
    @keyframes fade{0%{opacity:0.5;} 100%{opacity:1;}}
  </style>
</head>
<body>
<div class="app-wrapper">
  <!-- minimal header -->
  <header class="app-header">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M3 22L3 10L12 3L21 10L21 22Z" />
          <rect x="9" y="14" width="6" height="8" />
        </svg>
      </div>
      <div class="logo-text">
        <h1>Civil<span style="color:#1a4c8c;">AtHand</span></h1>
        <span>precision toolkit</span>
      </div>
    </div>
    <div class="pill-tag">
      ⚡ 8+ pro calculators
    </div>
  </header>

  <!-- SELECTOR VIEW (visible by default) -->
  <div id="selectorView">
    <div style="margin-bottom: 8px;">
      <h2 style="font-size: 2rem; font-weight: 650; color:#0b2b4a;">What do you want to calculate?</h2>
      <p style="color: var(--text-muted);">Select a tool — detailed inputs & visual results</p>
    </div>
    <div class="selector-grid" id="calcSelectorGrid">
      <!-- cards will be generated via JS -->
    </div>
    <div style="margin-top: 28px; padding: 18px 22px; background: #d9eafb; border-radius: 60px; color:#0a314e; display:inline-block;">
      ⭐ India‑ready · instant · no signup
    </div>
  </div>

  <!-- DETAIL VIEW (hidden initially) -->
  <div id="detailView" class="detail-view hidden">
    <button class="back-btn" id="backToSelectorBtn">
      <svg width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      All calculators
    </button>
    <div id="calcDynamicContent">
      <!-- dynamic calculator injected here -->
    </div>
  </div>

  <footer class="footer-note">
    © 2025 Civil At Hand — smart estimation · professional blue‑print
  </footer>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CALCULATOR DEFINITIONS ----------
    const calculators = [
      { id: 'brick', name: 'Brick & Mortar', icon: '🧱', desc: 'Wall bricks, cement bags · visual count' },
      { id: 'concrete', name: 'Concrete Mix', icon: '🏗️', desc: 'Cement, sand, aggregate (kg)' },
      { id: 'paint', name: 'Paint Estimator', icon: '🎨', desc: 'Litres for interior/exterior' },
      { id: 'area', name: 'Area Calc', icon: '📐', desc: 'Rectangle, circle, triangle, L‑shape' },
      { id: 'steel', name: 'TMT Steel Weight', icon: '⚙️', desc: 'IS code formula · kg' },
      { id: 'plaster', name: 'Plaster (C:S)', icon: '🖌️', desc: 'Cement bags & sand cft' },
      { id: 'tank', name: 'Water Tank', icon: '💧', desc: 'Capacity in litres' },
      { id: 'cost', name: 'Construction Cost', icon: '💰', desc: 'Approx. per sq.ft' }
    ];

    const selectorGrid = document.getElementById('calcSelectorGrid');
    const selectorView = document.getElementById('selectorView');
    const detailView = document.getElementById('detailView');
    const dynamicContent = document.getElementById('calcDynamicContent');
    const backBtn = document.getElementById('backToSelectorBtn');

    // render selector cards
    function renderSelector() {
      selectorGrid.innerHTML = '';
      calculators.forEach(calc => {
        const card = document.createElement('div');
        card.className = 'calc-card';
        card.setAttribute('data-id', calc.id);
        card.innerHTML = `
          <div class="calc-icon">${calc.icon}</div>
          <h3>${calc.name}</h3>
          <p>${calc.desc}</p>
        `;
        card.addEventListener('click', () => showCalculator(calc.id));
        selectorGrid.appendChild(card);
      });
    }
    renderSelector();

    // show detail view for a specific calculator
    function showCalculator(calcId) {
      const calc = calculators.find(c => c.id === calcId);
      if (!calc) return;
      
      // build UI based on id
      let html = `
        <div class="calc-title">
          <span style="font-size:2.8rem;">${calc.icon}</span>
          <h2>${calc.name}</h2>
        </div>
      `;
      
      // form & result area
      if (calcId === 'brick') {
        html += `
          <div class="input-panel">
            <div class="form-grid">
              <div class="row-2">
                <div class="input-group"><label>Length (ft)</label><input type="number" id="brickL" class="input-field" value="20" step="0.5" min="0.1"></div>
                <div class="input-group"><label>Height (ft)</label><input type="number" id="brickH" class="input-field" value="10" step="0.5" min="0.1"></div>
              </div>
              <div class="input-group">
                <label>Wall thickness</label>
                <select id="brickThick" class="input-field">
                  <option value="4.5">4.5 inch (115mm)</option>
                  <option value="9" selected>9 inch (230mm)</option>
                </select>
              </div>
              <button class="btn-primary" id="updateBrickBtn">Update estimate</button>
              <p class="unit-hint">Modular brick (190x90x90mm) · 10% wastage included</p>
            </div>
            <div class="result-card">
              <div class="result-label">🧱 Bricks required</div>
              <div class="result-value" id="brickCountDisplay">2,250</div>
              <div class="result-label">🪣 Cement bags (50kg)</div>
              <div style="font-size:2rem; font-weight:600; color:#0f3a6b;" id="brickCementDisplay">12.5</div>
            </div>
          </div>
          <div class="visual-container">
            <canvas id="brickCanvas" width="400" height="150" style="width:100%; height:auto; max-width:500px;"></canvas>
            <div class="brick-stats">
              <span>🔲 each █ = 50 bricks</span>
              <span id="brickVisualNote">≈ 2,250 bricks</span>
            </div>
          </div>
        `;
      } else if (calcId === 'concrete') {
        html += `
          <div class="input-panel">
            <div class="form-grid">
              <div class="row-2">
                <div class="input-group"><label>Volume (m³)</label><input type="number" id="concVol" class="input-field" value="5" step="0.1" min="0.1"></div>
                <div class="input-group"><label>Grade</label><select id="concGrade" class="input-field"><option value="M15">M15 (1:2:4)</option><option value="M20" selected>M20 (1:1.5:3)</option><option value="M25">M25 (1:1:2)</option></select></div>
              </div>
              <button class="btn-primary" id="updateConcBtn">Calculate</button>
            </div>
            <div class="result-card">
              <div class="result-value" id="cementKg">1,600</div><div class="result-label">kg Cement</div>
              <div style="display:flex; justify-content:space-between; margin-top:12px;">
                <span><strong id="sandKg">2,400</strong> kg sand</span>
                <span><strong id="aggKg">4,800</strong> kg aggregate</span>
              </div>
            </div>
          </div>
          <div class="visual-container" style="text-align:left;">
            <div style="display:flex; gap:20px; justify-content:center; font-size:2rem;">🚚 🏗️</div>
            <p style="margin-top:10px;">Approx. mixer loads · dry volume considered</p>
          </div>
        `;
      } else if (calcId === 'paint') {
        html += `
          <div class="input-panel">
            <div class="form-grid">
              <div class="input-group"><label>Area (sq.ft)</label><input type="number" id="paintArea" class="input-field" value="1500"></div>
              <div class="row-2">
                <div class="input-group"><label>Coats</label><select id="paintCoats" class="input-field"><option value="1">1</option><option value="2" selected>2</option></select></div>
                <div class="input-group"><label>Type</label><select id="paintType" class="input-field"><option value="interior">Interior</option><option value="exterior">Exterior</option></select></div>
              </div>
              <button class="btn-primary" id="updatePaintBtn">Estimate</button>
            </div>
            <div class="result-card">
              <div class="result-value" id="paintLitres">18.5</div><div class="result-label">Litres required</div>
              <p style="margin-top:12px;">Coverage: interior 130, exterior 100 sqft/litre</p>
            </div>
          </div>
          <div class="visual-container">🎨🖌️ ~ <span id="paintBuckets">5</span> buckets (4L each)</div>
        `;
      } else if (calcId === 'area') {
        html += `
          <div class="input-panel">
            <div class="form-grid">
              <div class="input-group"><label>Shape</label><select id="areaShape" class="input-field"><option value="rect">Rectangle</option><option value="circle">Circle</option><option value="triangle">Triangle</option><option value="lshape">L‑Shape</option></select></div>
              <div id="areaFields"></div>
              <button class="btn-primary" id="updateAreaBtn">Calculate area</button>
            </div>
            <div class="result-card">
              <div class="result-value"><span id="areaSqft">0.0</span> ft²</div>
              <div><span id="areaSqm">0.00</span> m²</div>
            </div>
          </div>
          <div class="visual-container" id="areaVisual">📏 Select shape</div>
        `;
      } else if (calcId === 'steel') {
        html += `
          <div class="input-panel">
            <div class="form-grid">
              <div class="row-2"><div class="input-group"><label>Dia (mm)</label><select id="steelDia" class="input-field"><option value="8">8</option><option value="10">10</option><option value="12" selected>12</option><option value="16">16</option><option value="20">20</option></select></div>
              <div class="input-group"><label>Length (m)</label><input id="steelLen" class="input-field" value="12"></div></div>
              <div class="input-group"><label>Quantity</label><input id="steelQty" class="input-field" value="5"></div>
              <button class="btn-primary" id="updateSteelBtn">Calculate weight</button>
            </div>
            <div class="result-card"><div class="result-value" id="steelWeight">53.3</div><div class="result-label">kg total</div></div>
          </div>
          <div class="visual-container">⚙️ D²/162 formula · TMT bars</div>
        `;
      } else if (calcId === 'plaster') {
        html += `
          <div class="input-panel"><div class="form-grid"><div class="input-group"><label>Area (sq.ft)</label><input id="plasterArea" class="input-field" value="500"></div>
          <div class="input-group"><label>Thickness</label><select id="plasterThick" class="input-field"><option value="12">12 mm</option><option value="15" selected>15 mm</option><option value="20">20 mm</option></select></div>
          <button class="btn-primary" id="updatePlasterBtn">Calculate</button></div>
          <div class="result-card"><div class="result-value"><span id="plastCement">8.2</span> bags</div><div><span id="plastSand">32</span> cft sand</div></div></div>
          <div class="visual-container">🖌️ 1:4 mix · 50kg bag</div>`;
      } else if (calcId === 'tank') {
        html += `
          <div class="input-panel"><div class="form-grid"><div class="row-2"><div class="input-group"><label>L (ft)</label><input id="tankL" class="input-field" value="6"></div><div class="input-group"><label>W (ft)</label><input id="tankW" class="input-field" value="4"></div></div>
          <div class="input-group"><label>H (ft)</label><input id="tankH" class="input-field" value="5"></div><button class="btn-primary" id="updateTankBtn">Calculate</button></div>
          <div class="result-card"><div class="result-value"><span id="tankLitres">3400</span> L</div><div><span id="tankGal">898</span> gal</div></div></div>
          <div class="visual-container">💧 1 ft³ = 28.3168 L</div>`;
      } else if (calcId === 'cost') {
        html += `
          <div class="input-panel"><div class="form-grid"><div class="input-group"><label>Area (sq.ft)</label><input id="costArea" class="input-field" value="1500"></div>
          <div class="row-2"><div class="input-group"><label>Finish</label><select id="costType" class="input-field"><option value="basic">Basic</option><option value="standard" selected>Standard</option><option value="premium">Premium</option></select></div>
          <div class="input-group"><label>Floors</label><select id="costFloor" class="input-field"><option value="1">G</option><option value="2" selected>G+1</option><option value="3">G+2</option></select></div></div>
          <button class="btn-primary" id="updateCostBtn">Estimate</button></div>
          <div class="result-card"><div class="result-value" id="costVal">₹22,50,000</div><div class="result-label">approx. construction cost</div></div></div>
          <div class="visual-container">💰 rates: basic 1400, std 1800, prem 2400 /sqft</div>`;
      }
      
      dynamicContent.innerHTML = html;
      
      // switch views
      selectorView.classList.add('hidden');
      detailView.classList.remove('hidden');
      
      // attach specific event listeners and initial calculation
      if (calcId === 'brick') {
        const updateBrick = () => {
          const L = parseFloat(document.getElementById('brickL')?.value) || 0;
          const H = parseFloat(document.getElementById('brickH')?.value) || 0;
          const thick = document.getElementById('brickThick')?.value;
          const area = L * H;
          const bricks = thick === '4.5' ? area * 5.5 : area * 11; // modular bricks per sqft approx
          const cement = thick === '4.5' ? area * 0.025 : area * 0.05; // bags
          document.getElementById('brickCountDisplay').innerText = Math.round(bricks).toLocaleString();
          document.getElementById('brickCementDisplay').innerText = cement.toFixed(1);
          document.getElementById('brickVisualNote').innerText = `≈ ${Math.round(bricks).toLocaleString()} bricks`;
          drawBrickCanvas(Math.round(bricks));
        };
        document.getElementById('updateBrickBtn')?.addEventListener('click', updateBrick);
        // also live if needed, but we use button
        updateBrick(); // initial
        
        function drawBrickCanvas(count) {
          const canvas = document.getElementById('brickCanvas');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          const w = 400, h = 150;
          canvas.width = w; canvas.height = h;
          ctx.clearRect(0,0,w,h);
          ctx.fillStyle = '#b45309'; ctx.strokeStyle = '#78350f';
          const brickW = 28, brickH = 14, gap = 3;
          let cols = Math.floor(w / (brickW+gap));
          let rows = Math.floor(h / (brickH+gap));
          let maxBricks = cols * rows;
          let showCount = Math.min(count, maxBricks);
          let brickIndex = 0;
          for (let r=0; r<rows; r++) {
            for (let c=0; c<cols; c++) {
              if (brickIndex >= showCount) break;
              let x = c*(brickW+gap) + (r%2===0?0: brickW/2);
              if (x+brickW > w) continue;
              ctx.fillStyle = '#c2410c';
              ctx.fillRect(x, r*(brickH+gap), brickW, brickH);
              ctx.strokeRect(x, r*(brickH+gap), brickW, brickH);
              brickIndex++;
            }
          }
          ctx.font = 'bold 12px Inter'; ctx.fillStyle = '#1e293b';
          ctx.fillText(`${showCount} bricks`, 10, 20);
        }
      } else if (calcId === 'concrete') {
        const updateConc = () => {
          const vol = parseFloat(document.getElementById('concVol')?.value)||0;
          const grade = document.getElementById('concGrade')?.value;
          const ratios = { M15:[1,2,4], M20:[1,1.5,3], M25:[1,1,2] };
          const r = ratios[grade];
          const sum = r[0]+r[1]+r[2];
          const cement = vol * (r[0]/sum) * 1440;
          const sand = vol * (r[1]/sum) * 1600;
          const agg = vol * (r[2]/sum) * 1500;
          document.getElementById('cementKg').innerText = Math.round(cement).toLocaleString();
          document.getElementById('sandKg').innerText = Math.round(sand).toLocaleString();
          document.getElementById('aggKg').innerText = Math.round(agg).toLocaleString();
        };
        document.getElementById('updateConcBtn')?.addEventListener('click', updateConc);
        updateConc();
      } else if (calcId === 'paint') {
        const updatePaint = () => {
          const area = parseFloat(document.getElementById('paintArea')?.value)||0;
          const coats = parseFloat(document.getElementById('paintCoats')?.value);
          const type = document.getElementById('paintType')?.value;
          const cover = type==='interior'?130:100;
          const litres = (area * coats)/cover;
          document.getElementById('paintLitres').innerText = litres.toFixed(1);
          const buckets = Math.ceil(litres/4);
          if(document.getElementById('paintBuckets')) document.getElementById('paintBuckets').innerText = buckets;
        };
        document.getElementById('updatePaintBtn')?.addEventListener('click', updatePaint);
        updatePaint();
      } else if (calcId === 'area') {
        const shapeSelect = document.getElementById('areaShape');
        const fieldsDiv = document.getElementById('areaFields');
        function renderAreaFields(){
          const shape = shapeSelect.value;
          if(shape==='rect') fieldsDiv.innerHTML = `<div class="row-2"><div class="input-group"><label>Length (ft)</label><input id="aL" class="input-field" value="20"></div><div class="input-group"><label>Width (ft)</label><input id="aW" class="input-field" value="15"></div></div>`;
          else if(shape==='circle') fieldsDiv.innerHTML = `<div class="input-group"><label>Radius (ft)</label><input id="aR" class="input-field" value="10"></div>`;
          else if(shape==='triangle') fieldsDiv.innerHTML = `<div class="row-2"><div class="input-group"><label>Base</label><input id="aB" value="12"></div><div class="input-group"><label>Height</label><input id="aH" value="8"></div></div>`;
          else if(shape==='lshape') fieldsDiv.innerHTML = `<div class="row-2"><div class="input-group"><label>Long L</label><input id="lL" value="20"></div><div class="input-group"><label>Long W</label><input id="lW" value="12"></div></div><div class="row-2"><div class="input-group"><label>Short L</label><input id="sL" value="8"></div><div class="input-group"><label>Short W</label><input id="sW" value="8"></div></div>`;
        }
        shapeSelect.addEventListener('change', renderAreaFields);
        renderAreaFields();
        const calcArea = () => {
          let sqft=0; const shape=shapeSelect.value;
          if(shape==='rect'){ let l=parseFloat(document.getElementById('aL')?.value)||0,w=parseFloat(document.getElementById('aW')?.value)||0; sqft=l*w;}
          else if(shape==='circle'){ let r=parseFloat(document.getElementById('aR')?.value)||0; sqft=Math.PI*r*r;}
          else if(shape==='triangle'){ let b=parseFloat(document.getElementById('aB')?.value)||0,h=parseFloat(document.getElementById('aH')?.value)||0; sqft=0.5*b*h;}
          else if(shape==='lshape'){ let lL=parseFloat(document.getElementById('lL')?.value)||0,lW=parseFloat(document.getElementById('lW')?.value)||0,sL=parseFloat(document.getElementById('sL')?.value)||0,sW=parseFloat(document.getElementById('sW')?.value)||0; sqft=(lL*lW)+(sL*sW);}
          document.getElementById('areaSqft').innerText = sqft.toFixed(2);
          document.getElementById('areaSqm').innerText = (sqft*0.092903).toFixed(2);
        };
        document.getElementById('updateAreaBtn').addEventListener('click', calcArea);
        calcArea();
      } else if (calcId === 'steel') {
        const updateSteel = () => {
          const d=parseFloat(document.getElementById('steelDia')?.value)||12;
          const l=parseFloat(document.getElementById('steelLen')?.value)||0;
          const q=parseFloat(document.getElementById('steelQty')?.value)||0;
          const w = (d*d/162)*l*q;
          document.getElementById('steelWeight').innerText = w.toFixed(2);
        };
        document.getElementById('updateSteelBtn')?.addEventListener('click', updateSteel);
        updateSteel();
      } else if (calcId === 'plaster') {
        const updatePlaster = () => {
          const area=parseFloat(document.getElementById('plasterArea')?.value)||0;
          const thick=parseFloat(document.getElementById('plasterThick')?.value);
          const vol = area * 0.0929 * (thick/1000);
          const cement = vol * 1440 * 0.2 / 50;
          const sand = vol * 0.8 * 35.315;
          document.getElementById('plastCement').innerText = cement.toFixed(1);
          document.getElementById('plastSand').innerText = sand.toFixed(0);
        };
        document.getElementById('updatePlasterBtn')?.addEventListener('click', updatePlaster);
        updatePlaster();
      } else if (calcId === 'tank') {
        const updateTank = () => {
          const l=parseFloat(document.getElementById('tankL')?.value)||0,w=parseFloat(document.getElementById('tankW')?.value)||0,h=parseFloat(document.getElementById('tankH')?.value)||0;
          const litres = l*w*h*28.3168;
          document.getElementById('tankLitres').innerText = Math.round(litres);
          document.getElementById('tankGal').innerText = Math.round(litres*0.264172);
        };
        document.getElementById('updateTankBtn')?.addEventListener('click', updateTank);
        updateTank();
      } else if (calcId === 'cost') {
        const updateCost = () => {
          const area=parseFloat(document.getElementById('costArea')?.value)||0;
          const type=document.getElementById('costType')?.value;
          const floor=parseFloat(document.getElementById('costFloor')?.value)||1;
          const rates={basic:1400, standard:1800, premium:2400};
          const cost = area * floor * rates[type];
          document.getElementById('costVal').innerText = '₹'+cost.toLocaleString('en-IN');
        };
        document.getElementById('updateCostBtn')?.addEventListener('click', updateCost);
        updateCost();
      }
    }

    // Back to selector
    backBtn.addEventListener('click', () => {
      detailView.classList.add('hidden');
      selectorView.classList.remove('hidden');
    });

    // Preload selector view
  })();
</script>
<!-- ensure any missing ids are handled, no errors -->
